<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Character Chat</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="app-shell">
    <!-- 上部ステータス。LLM 接続状態とモデル名を固定表示する。 -->
    <header class="topbar">
      <div>
        <p class="eyebrow">DAY2 WEB APP</p>
        <h1>AIキャラ会話</h1>
      </div>
      <div class="status-group">
        <span id="server-status" class="status-badge status-loading">接続確認中</span>
        <span id="model-name" class="model-name">model: -</span>
      </div>
    </header>

    <main class="layout" id="layout-root">
      <!-- 左カラム。キャラ設定と会話制御をまとめた常設パネル。 -->
      <aside class="character-panel" id="character-panel">
        <div class="character-visual" id="character-visual">
          <span id="character-avatar-label">も</span>
        </div>
        <div class="character-body">
          <label class="field-label" for="character-select">キャラクター</label>
          <select id="character-select"></select>
          <h2 id="character-name">-</h2>
          <p id="character-description" class="character-description"></p>
          <dl class="character-meta">
            <div>
              <dt>会話ターン記憶数</dt>
              <dd>
                <input type="number" id="history-count-input" min="0" max="20" value="10" placeholder="0-20">
              </dd>
            </div>
            <div>
              <dt>音声ストリーミング</dt>
              <dd>
                <label class="toggle-field" for="audio-enabled-toggle">
                  <input type="checkbox" id="audio-enabled-toggle">
                  <span id="audio-enabled-label">TTS未接続</span>
                </label>
              </dd>
            </div>
          </dl>

          <label class="field-label" for="role-text">キャラクタロール</label>
          <textarea id="role-text" rows="12" placeholder="キャラクター設定や口調を入力"></textarea>
        </div>
        <div class="panel-actions">
          <button id="new-conversation-button" class="secondary-button" type="button">新しい会話</button>
          <button id="clear-conversation-button" class="secondary-button" type="button">履歴クリア</button>
        </div>
      </aside>

      <!-- 右カラム。拡大メディア、会話ログ、送信フォームを積む。 -->
      <section class="chat-panel" id="chat-panel">
        <!-- 拡大表示時だけ使うステージ。ボタンは残し、中身だけ差し替える。 -->
        <div id="chat-visual-stage" class="chat-visual-stage hidden" aria-live="polite">
          <button id="chat-visual-close" class="chat-visual-close" type="button" aria-label="拡大表示を閉じる">×</button>
        </div>
        <div id="chat-messages" class="chat-messages"></div>
        <div id="error-banner" class="error-banner hidden"></div>
        <form id="composer" class="composer">
          <textarea id="message-input" rows="3" placeholder="ももに話しかけてください"></textarea>
          <button id="send-button" type="submit">送信</button>
        </form>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
